<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSA | Favorites</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { bg: '#050507', panel: '#0e0e11', border: '#1e1e24', bull: '#00ff88', bear: '#ff0055', warn: '#f59e0b' },
                    fontFamily: { sans: ['Outfit', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                }
            }
        }
    </script>
    <style>
        body { background-color: #050507; color: #e2e8f0; cursor: crosshair; }
        button, a, input { cursor: pointer; }
        .glass-box {
            background: rgba(14, 14, 17, 0.7);
            border: 1px solid #1e1e24;
            backdrop-filter: blur(12px);
            transition: border-color 0.3s ease;
        }
        .glass-box:hover { border-color: rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050507; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-link {
            font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
            color: #6b7280; padding: 6px 12px; border-radius: 8px;
            white-space: nowrap; transition: color .2s, background .2s; background: transparent;
            border: none; cursor: pointer;
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-active { color: #fff; background: rgba(255,255,255,0.06); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-bull selection:text-black font-sans">

    <nav class="h-14 flex-none border-b border-border bg-panel flex items-center gap-2 px-4 md:px-6 relative z-[400]">
        <a href="index.html" class="flex items-center mr-2 flex-none">
            <div class="w-3 h-3 bg-bull rounded-sm mr-2 shadow-[0_0_10px_#00ff88]"></div>
            <span class="font-mono font-bold text-base tracking-tighter hidden sm:block">MSA_CORE</span>
        </a>
        <div class="flex items-center gap-1 flex-1 overflow-x-auto">
            <a href="dashboard.html" class="nav-link">Terminal</a>
            <a href="compare.html" class="nav-link">Compare</a>
            <a href="favorites.html" class="nav-link nav-active">Favorites</a>
            <a href="dashboard.html" class="nav-link">Ask MSA</a>
            <a href="index.html" class="nav-link">Home</a>
        </div>
        <div class="flex items-center gap-2 flex-none">
            <button id="currency-btn" class="text-xs font-mono px-3 py-1.5 glass-box rounded-lg text-gray-400 hover:text-bull hover:border-bull/30 transition font-bold">USD</button>
            <button id="lang-btn" class="text-xs font-mono px-3 py-1.5 glass-box rounded-lg text-gray-400 hover:text-bull hover:border-bull/30 transition font-bold">عربي</button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 border-b border-border bg-bg/80 backdrop-blur flex items-center justify-between px-6">
            <div class="flex items-center gap-3">
                <span class="text-warn text-xl">★</span>
                <h1 class="text-lg font-black text-white tracking-tight">Your Favorites</h1>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            <div class="max-w-7xl mx-auto space-y-8">

                <!-- Saved favorites -->
                <section class="animate-fade-in">
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Starred Tickers</h2>
                    <div id="fav-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
                    <div id="fav-empty" class="hidden glass-box rounded-xl p-10 text-center">
                        <div class="text-4xl mb-3 text-gray-600">★</div>
                        <p class="text-gray-500 text-sm">No favorites yet. Star a ticker on the terminal and it will appear here.</p>
                        <a href="dashboard.html" class="inline-block mt-5 px-5 py-2 bg-bull/10 border border-bull/30 text-bull rounded-lg text-sm font-bold hover:bg-bull/20 transition">Open the Terminal</a>
                    </div>
                </section>

                <!-- Favorite market -->
                <section class="animate-fade-in" style="animation-delay:0.15s">
                    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
                        <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Your Favorite Market</h2>
                        <span class="text-[10px] font-mono text-gray-600" id="market-hint">Pick a sector — we remember it and suggest tickers to explore.</span>
                    </div>
                    <div id="market-chips" class="flex flex-wrap gap-2 mb-6"></div>
                    <div id="market-tickers" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
                </section>

            </div>
        </div>
    </main>

    <script>
        // shared cookie helpers (same keys as the terminal)
        function setCookie(name, value, days = 365) {
            document.cookie = `${name}=${encodeURIComponent(value)};path=/;max-age=${days * 86400};SameSite=Lax`;
        }
        function getCookie(name) {
            const m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
            return m ? decodeURIComponent(m[1]) : null;
        }
        function getFavorites() {
            try { const l = JSON.parse(getCookie('msa_favorites') || '[]'); return Array.isArray(l) ? l : []; }
            catch { return []; }
        }
        function saveFavorites(l) { setCookie('msa_favorites', JSON.stringify(l)); }

        // ═══ i18n ═══
        const AR = {
            'Terminal': 'لوحة التحليل', 'Compare': 'المقارنة', 'Favorites': 'المفضلة', 'Home': 'الرئيسية',
            'Your Favorites': 'مفضلتك', 'Starred Tickers': 'الأسهم المميزة بنجمة',
            'No favorites yet. Star a ticker on the terminal and it will appear here.':
                'لا مفضلات بعد. ميّز أي سهم بنجمة في لوحة التحليل وسيظهر هنا.',
            'Open the Terminal': 'افتح لوحة التحليل',
            'Your Favorite Market': 'سوقك المفضلة',
            'Pick a sector — we remember it and suggest tickers to explore.': 'اختر قطاعًا — نتذكره ونقترح أسهمًا لاستكشافها.',
            'Analyze': 'تحليل', 'Compare it': 'قارِن', 'Remove': 'إزالة', 'Add to favorites': 'أضف للمفضلة', 'In favorites': 'في المفضلة',
            'Technology': 'التقنية', 'Healthcare': 'الرعاية الصحية', 'Energy': 'الطاقة', 'Financials': 'المالية',
            'Consumer': 'السلع الاستهلاكية', 'Industrials': 'الصناعة', 'Saudi Market': 'السوق السعودية',
            'STATUS:': 'الحالة:', 'READY': 'جاهز',
        };
        let lang = getCookie('msa_lang') === 'ar' ? 'ar' : 'en';
        const t = (s) => (lang === 'ar' && AR[s]) ? AR[s] : s;
        function translateTree(root) {
            const tw = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
            let n;
            while (n = tw.nextNode()) {
                if (lang === 'ar') {
                    const key = n.nodeValue.trim();
                    if (key && AR[key] != null) {
                        if (n.__en == null) n.__en = n.nodeValue;
                        n.nodeValue = n.nodeValue.replace(key, AR[key]);
                    }
                } else if (n.__en != null) { n.nodeValue = n.__en; n.__en = null; }
            }
        }
        function applyLang() {
            document.documentElement.lang = lang;
            translateTree(document.body);
            document.getElementById('lang-btn').textContent = lang === 'ar' ? 'EN' : 'عربي';
            render();
        }
        document.getElementById('lang-btn').addEventListener('click', () => {
            lang = lang === 'ar' ? 'en' : 'ar';
            setCookie('msa_lang', lang);
            applyLang();
        });

        // ═══ Markets (curated navigation lists, not market data) ═══
        const MARKETS = [
            ['tech', 'Technology', [['AAPL', 'Apple'], ['MSFT', 'Microsoft'], ['NVDA', 'NVIDIA'], ['GOOGL', 'Alphabet'], ['META', 'Meta'], ['AMZN', 'Amazon'], ['TSLA', 'Tesla'], ['AMD', 'AMD']]],
            ['health', 'Healthcare', [['JNJ', 'Johnson & Johnson'], ['UNH', 'UnitedHealth'], ['LLY', 'Eli Lilly'], ['PFE', 'Pfizer'], ['ABBV', 'AbbVie'], ['MRK', 'Merck']]],
            ['energy', 'Energy', [['XOM', 'Exxon Mobil'], ['CVX', 'Chevron'], ['SHEL', 'Shell'], ['COP', 'ConocoPhillips'], ['SLB', 'SLB'], ['2222.SR', 'Saudi Aramco']]],
            ['financials', 'Financials', [['JPM', 'JPMorgan'], ['V', 'Visa'], ['MA', 'Mastercard'], ['BAC', 'Bank of America'], ['GS', 'Goldman Sachs'], ['1120.SR', 'Al Rajhi Bank']]],
            ['consumer', 'Consumer', [['PG', 'Procter & Gamble'], ['KO', 'Coca-Cola'], ['PEP', 'PepsiCo'], ['WMT', 'Walmart'], ['MCD', "McDonald's"], ['NKE', 'Nike']]],
            ['industrials', 'Industrials', [['CAT', 'Caterpillar'], ['BA', 'Boeing'], ['HON', 'Honeywell'], ['GE', 'GE Aerospace'], ['UPS', 'UPS'], ['DE', 'John Deere']]],
            ['saudi', 'Saudi Market', [['2222.SR', 'Saudi Aramco'], ['1120.SR', 'Al Rajhi Bank'], ['2010.SR', 'SABIC'], ['7010.SR', 'stc'], ['2082.SR', 'ACWA Power'], ['1211.SR', "Ma'aden"]]],
        ];
        function getMarket() {
            const m = getCookie('msa_fav_market');
            return MARKETS.some(([id]) => id === m) ? m : 'tech';
        }

        function tickerCard(ticker, name, { removable } = {}) {
            const favs = getFavorites();
            const isFav = favs.includes(ticker);
            const card = document.createElement('div');
            card.className = 'glass-box rounded-xl p-4 flex flex-col gap-3 hover:border-bull/30 transition';
            card.innerHTML = `
                <div class="flex items-start justify-between">
                    <div>
                        <div class="text-xl font-black font-mono text-white">${ticker}</div>
                        ${name ? `<div class="text-[10px] font-mono text-gray-500 mt-0.5">${name}</div>` : ''}
                    </div>
                    <button class="fav-toggle text-lg leading-none ${isFav ? 'text-warn' : 'text-gray-600 hover:text-warn'} transition"
                        title="${isFav ? t('In favorites') : t('Add to favorites')}">${isFav ? '★' : '☆'}</button>
                </div>
                <div class="flex gap-2 mt-auto">
                    <a href="dashboard.html?ticker=${encodeURIComponent(ticker)}"
                       class="flex-1 text-center text-[11px] font-mono font-bold px-2 py-1.5 bg-bull/10 border border-bull/30 text-bull rounded-lg hover:bg-bull/20 transition">${t('Analyze')}</a>
                    <a href="compare.html?a=${encodeURIComponent(ticker)}&b="
                       class="flex-1 text-center text-[11px] font-mono font-bold px-2 py-1.5 bg-warn/10 border border-warn/30 text-warn rounded-lg hover:bg-warn/20 transition">${t('Compare it')}</a>
                    ${removable ? `<button class="fav-remove text-[11px] font-mono px-2 py-1.5 text-gray-600 hover:text-bear border border-transparent hover:border-bear/30 rounded-lg transition" title="${t('Remove')}">✕</button>` : ''}
                </div>`;
            card.querySelector('.fav-toggle').onclick = () => {
                let l = getFavorites();
                l = l.includes(ticker) ? l.filter(x => x !== ticker) : [...l, ticker];
                saveFavorites(l);
                render();
            };
            const rm = card.querySelector('.fav-remove');
            if (rm) rm.onclick = () => { saveFavorites(getFavorites().filter(x => x !== ticker)); render(); };
            return card;
        }

        const NAME_LOOKUP = {};
        MARKETS.forEach(([, , list]) => list.forEach(([tk, nm]) => { NAME_LOOKUP[tk] = nm; }));

        function render() {
            // favorites grid
            const grid = document.getElementById('fav-grid');
            const empty = document.getElementById('fav-empty');
            const favs = getFavorites();
            grid.innerHTML = '';
            empty.classList.toggle('hidden', favs.length > 0);
            grid.classList.toggle('hidden', favs.length === 0);
            favs.forEach(tk => grid.appendChild(tickerCard(tk, NAME_LOOKUP[tk] || '', { removable: true })));

            // market chips
            const chips = document.getElementById('market-chips');
            chips.innerHTML = '';
            const current = getMarket();
            MARKETS.forEach(([id, label]) => {
                const b = document.createElement('button');
                b.className = id === current
                    ? 'px-4 py-1.5 rounded-full text-xs font-mono font-bold bg-bull/15 text-bull border border-bull/40'
                    : 'px-4 py-1.5 rounded-full text-xs font-mono text-gray-400 glass-box hover:text-bull hover:border-bull/30 transition';
                b.textContent = t(label);
                b.onclick = () => { setCookie('msa_fav_market', id); render(); };
                chips.appendChild(b);
            });

            // suggested tickers for the chosen market
            const wrap = document.getElementById('market-tickers');
            wrap.innerHTML = '';
            const m = MARKETS.find(([id]) => id === current);
            m[2].forEach(([tk, nm]) => wrap.appendChild(tickerCard(tk, nm)));
            translateTree(document.querySelector('main'));
        }

        (function initCurrency(){
            const btn = document.getElementById('currency-btn');
            if (!btn) return;
            let forceSAR = getCookie('msa_currency') === 'SAR';
            const refresh = () => { btn.textContent = forceSAR ? 'SAR' : 'USD'; };
            btn.addEventListener('click', () => {
                forceSAR = !forceSAR;
                setCookie('msa_currency', forceSAR ? 'SAR' : 'USD');
                refresh();
            });
            refresh();
        })();

        render();
        applyLang();
    </script>
</body>
</html>
